name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract project ZIP
        run: |
          ZIP_FILE="project.zip"
          if [ ! -f "$ZIP_FILE" ]; then
            echo "project.zip not found in repo!"
            exit 1
          fi
          echo "Found ZIP: $ZIP_FILE"
          mkdir -p extracted
          unzip -o "$ZIP_FILE" -d extracted
          # Handle nested folder inside ZIP
          INNER=$(ls extracted/)
          if [ $(ls extracted/ | wc -l) -eq 1 ] && [ -d "extracted/$INNER" ]; then
            echo "Moving contents from nested folder: $INNER"
            cp -r extracted/$INNER/. ./project/
          else
            cp -r extracted/. ./project/
          fi
          ls -la project/

      - name: Grant execute permission for gradlew
        run: chmod +x project/gradlew

      - name: Build Debug APK
        working-directory: project
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: project/app/build/outputs/apk/debug/app-debug.apk
