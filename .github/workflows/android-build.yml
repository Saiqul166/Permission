name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract project ZIP
        run: |
          ZIP_FILE="project.zip"
          if [ ! -f "$ZIP_FILE" ]; then
            echo "ERROR: project.zip not found!"
            exit 1
          fi
          mkdir -p extracted
          unzip -o "$ZIP_FILE" -d extracted
          # Handle single nested folder
          ITEMS=$(ls extracted/ | wc -l)
          INNER=$(ls extracted/)
          if [ "$ITEMS" -eq 1 ] && [ -d "extracted/$INNER" ]; then
            echo "Nested folder detected: $INNER"
            mkdir -p project
            cp -r extracted/$INNER/. ./project/
          else
            mkdir -p project
            cp -r extracted/. ./project/
          fi
          echo "=== Project structure ==="
          ls -la project/

      - name: Setup Gradle wrapper (if missing)
        working-directory: project
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found — generating wrapper..."
            # Find gradle build file to confirm this is a valid project
            if [ ! -f "build.gradle" ] && [ ! -f "build.gradle.kts" ]; then
              echo "ERROR: No build.gradle found in project root!"
              echo "Project contents:"
              ls -la
              exit 1
            fi
            # Install gradle to generate wrapper
            gradle wrapper --gradle-version 8.2 --distribution-type bin
            echo "Gradle wrapper generated successfully"
          else
            echo "gradlew found, skipping generation"
          fi
          chmod +x gradlew
          ls -la

      - name: Create local.properties
        working-directory: project
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Build Debug APK
        working-directory: project
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: project/app/build/outputs/apk/debug/app-debug.apk
